<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Missile Test Tracker | INDRA Networks</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Two-Tone White & Red Theme */
        body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem; max-width: 1400px; margin: auto; background: #ffffff; color: #111111; }
        
        .header-container { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem; border-bottom: 2px solid #cc0000; padding-bottom: 1rem; }
        .header-container h1 { margin: 0; color: #cc0000; text-transform: uppercase; letter-spacing: 1px; }
        
        .controls { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; background: #fafafa; padding: 1rem; border: 1px solid #e0e0e0; border-radius: 4px; }
        input, select { padding: 10px; border: 1px solid #cccccc; border-radius: 4px; font-size: 15px; flex: 1; min-width: 200px; }
        input:focus, select:focus { outline: none; border-color: #cc0000; }
        
        .btn-download { background-color: #cc0000; color: white; border: none; padding: 12px 20px; font-size: 14px; font-weight: 600; text-transform: uppercase; border-radius: 4px; cursor: pointer; }
        .btn-download:hover { background-color: #990000; }

        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin-bottom: 2rem; height: 350px; }
        .dashboard-panel { background: #ffffff; padding: 1rem; border: 1px solid #e0e0e0; border-radius: 4px; display: flex; flex-direction: column; }
        #map { flex-grow: 1; border-radius: 4px; border: 1px solid #e0e0e0; z-index: 1; }
        .panel-title { font-size: 14px; font-weight: 700; text-transform: uppercase; color: #555555; margin-top: 0; margin-bottom: 10px; }

        .counter { margin-bottom: 1rem; font-weight: 600; color: #cc0000; text-transform: uppercase; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; border: 1px solid #e0e0e0; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #e0e0e0; }
        th { background-color: #fafafa; font-weight: 700; text-transform: uppercase; font-size: 12px; color: #111111; }
        tr:hover { background-color: #fff9f9; }
        
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-right: 5px; margin-bottom: 5px; background: #e0e0e0; color: #333; }
        .badge-success { background: #e8f5e9; color: #2e7d32; }
        .badge-iaf { background: #e3f2fd; color: #1565c0; }
        .badge-navy { background: #e0f7fa; color: #00838f; }
        .badge-army { background: #f1f8e9; color: #558b2f; }
        .badge-drdo { background: #fce4ec; color: #c2185b; }
        .badge-sfc { background: #fff3e0; color: #e65100; }
        
        .btn-link { color: #cc0000; text-decoration: none; font-weight: 600; }
        .btn-link:hover { text-decoration: underline; color: #990000; }
    </style>
</head>
<body>

    <div class="header-container">
        <div>
            <h1>Missile Test Tracker — India</h1>
            <p style="margin: 5px 0 0 0; color: #555555; font-weight: 500;">Geospatial & Technical Intelligence Dashboard | INDRA Networks</p>
        </div>
        <button class="btn-download" onclick="downloadExport()">📥 Export Filtered Data</button>
    </div>
    
    <div class="controls">
        <input type="text" id="searchBox" placeholder="Search family, variant, or platform...">
        <select id="serviceFilter">
            <option value="">All Services</option>
            <option value="IAF">Indian Air Force</option>
            <option value="Indian Navy">Indian Navy</option>
            <option value="Indian Army">Indian Army</option>
            <option value="SFC">Strategic Forces Command</option>
            <option value="DRDO">DRDO</option>
        </select>
        <select id="typeFilter">
            <option value="">All Event Types</option>
            <option value="Development Test">Development Test</option>
            <option value="User Trial">User Trial</option>
            <option value="Operational Launch">Operational Launch</option>
            <option value="Training Launch">Training Launch</option>
        </select>
        <select id="yearFilter">
            <option value="">All Years</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
        </select>
    </div>

    <div class="dashboard-grid">
        <div class="dashboard-panel">
            <p class="panel-title">Geospatial Launch Density</p>
            <div id="map"></div>
        </div>
        <div class="dashboard-panel">
            <p class="panel-title">Launch Activity by Service</p>
            <canvas id="activityChart"></canvas>
        </div>
    </div>

    <div class="counter" id="recordCounter">Initializing architecture...</div>

    <table id="trackerTable">
        <thead>
            <tr>
                <th style="width: 10%;">Date / ID</th>
                <th style="width: 15%;">System Family</th>
                <th style="width: 20%;">Deployment & Event</th>
                <th style="width: 15%;">Launch Location</th>
                <th>Engineering Notes</th>
                <th style="width: 8%;">Source</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        let eventData = [];
        let locationMap = {};
        
        let activityChartInstance = null; 
        let geoMap = null;
        let mapMarkers = [];

        // Basic CSV to Array of Objects parser
        function parseCSVToObjects(csv) {
            const lines = csv.split('\n').filter(l => l.trim().length > 0);
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const result = [];
            
            for(let i = 1; i < lines.length; i++) {
                // Regex handles commas inside quotes
                const rowRegex = /(".*?"|[^",\s]+)(?=\s*,|\s*$)/g;
                let matches = lines[i].match(rowRegex);
                
                if (matches) {
                    let obj = {};
                    let vals = matches.map(v => v.replace(/^"|"$/g, '').trim());
                    headers.forEach((h, index) => {
                        obj[h] = vals[index] !== undefined ? vals[index] : "";
                    });
                    result.push(obj);
                }
            }
            return result;
        }

        // Initialize the Map
        function initMap() {
            geoMap = L.map('map').setView([21.0, 82.0], 5); // Center on India
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(geoMap);
        }

        // Fetch Both CSVs Simultaneously using Promise.all
        Promise.all([
            fetch('locations.csv').then(res => res.text()),
            fetch('normalized_missiles.csv').then(res => res.text())
        ]).then(([locText, dataText]) => {
            
            // 1. Build Location Dictionary
            let locArray = parseCSVToObjects(locText);
            locArray.forEach(loc => {
                locationMap[loc.location_id] = loc;
            });

            // 2. Parse Event Data
            eventData = parseCSVToObjects(dataText);
            
            // 3. Sort Chronologically
            eventData.sort((a, b) => {
                if (a.date === "Unknown") return 1;
                if (b.date === "Unknown") return -1;
                return new Date(b.date) - new Date(a.date);
            });

            initMap();
            applyFilters(); // Initial render
        });

        // Get badge color based on service
        function getServiceBadge(service) {
            let cls = 'badge';
            if(service === 'IAF') cls += ' badge-iaf';
            else if(service === 'Indian Navy') cls += ' badge-navy';
            else if(service === 'Indian Army') cls += ' badge-army';
            else if(service === 'SFC') cls += ' badge-sfc';
            else if(service === 'DRDO') cls += ' badge-drdo';
            return `<span class="${cls}">${service}</span>`;
        }

        function renderDatabase(rows) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('recordCounter').innerText = `${rows.length} Flight Trials matching query parameters`;
            tbody.innerHTML = '';
            
            rows.forEach(row => {
                // Resolve Location from the joined dictionary
                let loc = locationMap[row.location_id] || { location_name: "Unknown Range", state: "" };
                
                let linkOutput = row.source_url ? `<a href="${row.source_url}" target="_blank" class="btn-link">${row.source_type} ↗</a>` : `<span style="color:#b5b5b5">${row.source_type}</span>`;
                
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${row.date}</strong><br><small style="color:#555">${row.event_id}</small></td>
                    <td><span style="font-size:15px; font-weight:700; color:#cc0000;">${row.family}</span><br><span style="color:#555; font-size:12px;">Variant: ${row.variant}</span></td>
                    <td>
                        ${getServiceBadge(row.service)}
                        <span class="badge badge-success">${row.result}</span>
                        <br>
                        <span style="font-weight:600; font-size:12px;">Type:</span> ${row.event_type}<br>
                        <span style="font-weight:600; font-size:12px;">Platform:</span> ${row.platform}
                    </td>
                    <td><strong>${loc.location_name}</strong><br><small>${loc.state}</small></td>
                    <td style="color:#333; line-height: 1.4;">${row.notes}</td>
                    <td>${linkOutput}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderVisualizations(rows) {
            // --- 1. Update Chart (Service Breakdown) ---
            const ctx = document.getElementById('activityChart').getContext('2d');
            let serviceCounts = {};
            rows.forEach(row => {
                let svc = row.service || "Unknown";
                serviceCounts[svc] = (serviceCounts[svc] || 0) + 1;
            });

            const labels = Object.keys(serviceCounts);
            const data = labels.map(svc => serviceCounts[svc]);

            if (activityChartInstance) activityChartInstance.destroy();

            activityChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#1565c0', '#00838f', '#558b2f', '#e65100', '#c2185b', '#999999'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } } },
                    cutout: '70%'
                }
            });

            // --- 2. Update Map Markers ---
            // Clear existing markers
            mapMarkers.forEach(m => geoMap.removeLayer(m));
            mapMarkers = [];

            let locationDensity = {};
            rows.forEach(row => {
                let loc = locationMap[row.location_id];
                if(loc && loc.latitude) {
                    locationDensity[row.location_id] = (locationDensity[row.location_id] || 0) + 1;
                }
            });

            Object.keys(locationDensity).forEach(locId => {
                let loc = locationMap[locId];
                let count = locationDensity[locId];
                
                // Draw circle proportional to amount of tests
                let marker = L.circleMarker([loc.latitude, loc.longitude], {
                    radius: Math.min(Math.max(count * 2, 8), 30), // Scale radius
                    fillColor: "#cc0000",
                    color: "#ffffff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.7
                }).addTo(geoMap);

                marker.bindPopup(`<strong>${loc.location_name}</strong><br>Recorded Events: ${count}`);
                mapMarkers.push(marker);
            });
        }

        function applyFilters() {
            let search = document.getElementById('searchBox').value.toLowerCase();
            let svcFilter = document.getElementById('serviceFilter').value;
            let typeFilter = document.getElementById('typeFilter').value;
            let yearFilter = document.getElementById('yearFilter').value;

            let filtered = eventData.filter(row => {
                let matchSearch = row.family.toLowerCase().includes(search) || row.variant.toLowerCase().includes(search) || row.platform.toLowerCase().includes(search);
                let matchSvc = svcFilter === "" || row.service === svcFilter;
                let matchType = typeFilter === "" || row.event_type === typeFilter;
                let matchYear = yearFilter === "" || (row.date && row.date.startsWith(yearFilter));
                
                return matchSearch && matchSvc && matchType && matchYear;
            });
            
            renderDatabase(filtered);
            renderVisualizations(filtered);
        }

        function downloadExport() {
            let csvContent = '"DATA CURATED BY:","Shwetabh Singh"\n"PROJECT:","Indian Missile Test Tracker"\n\n';
            csvContent += '"Event ID","Date","Family","Variant","Service","Platform","Location","Event Type","Result","Source Type","Source URL","Notes"\n';

            // We export exactly what is currently filtered on the screen
            let activeFilters = document.getElementById('searchBox').value; // We trigger applyFilters again to get the exact array
            
            // Re-run the filter logic quietly to get the raw object array for pristine export
            let search = document.getElementById('searchBox').value.toLowerCase();
            let svcFilter = document.getElementById('serviceFilter').value;
            let typeFilter = document.getElementById('typeFilter').value;
            let yearFilter = document.getElementById('yearFilter').value;

            let filteredForExport = eventData.filter(row => {
                let matchSearch = row.family.toLowerCase().includes(search) || row.variant.toLowerCase().includes(search) || row.platform.toLowerCase().includes(search);
                let matchSvc = svcFilter === "" || row.service === svcFilter;
                let matchType = typeFilter === "" || row.event_type === typeFilter;
                let matchYear = yearFilter === "" || (row.date && row.date.startsWith(yearFilter));
                return matchSearch && matchSvc && matchType && matchYear;
            });

            filteredForExport.forEach(row => {
                let loc = locationMap[row.location_id] ? locationMap[row.location_id].location_name : "Unknown";
                csvContent += `"${row.event_id}","${row.date}","${row.family}","${row.variant}","${row.service}","${row.platform}","${loc}","${row.event_type}","${row.result}","${row.source_type}","${row.source_url}","${row.notes.replace(/"/g, '""')}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Missile_Tracker_Export_Shwetabh_Singh.csv";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Event Listeners
        document.getElementById('searchBox').addEventListener('input', applyFilters);
        document.getElementById('serviceFilter').addEventListener('change', applyFilters);
        document.getElementById('typeFilter').addEventListener('change', applyFilters);
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
    </script>
</body>
</html>
