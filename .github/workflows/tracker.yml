name: Missile Tracker Updater

on:
  schedule:
    # Runs at 06:00 UTC every Monday
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    # Required permission for the bot to push files back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests feedparser beautifulsoup4 lxml

      - name: Ensure candidates.csv exists
        run: |
          if [ ! -f candidates.csv ]; then
            echo "event_id,date,family,variant,service,platform,location_id,event_type,result,source_type,source_url,confidence,notes,_title,_prid" > candidates.csv
          fi

      - name: Run Tracker Script
        run: python missile_tracker_updater.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update candidate missile tests"
          file_pattern: "candidates.csv .tracker_state.json"