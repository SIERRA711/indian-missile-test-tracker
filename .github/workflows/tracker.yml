name: Missile Tracker Updater

on:
  schedule:
    # Runs at 00:00 UTC every day (once per 24 hours).
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually click "Run workflow" from the GitHub UI

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    # Required permission for the bot to push files back to your repo
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests feedparser beautifulsoup4

      - name: Run Tracker Script
        run: python missile_tracker_updater.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update candidate missile tests"
          file_pattern: "candidates.csv .tracker_state.json"